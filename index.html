<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Widget — Тестовая страница</title>

  <!-- Стили виджета -->
  <link rel="stylesheet" href="widget/quiz-theme.css" />

  <style>
    /* ── Страница-заглушка, имитирующая EdTech-сайт ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      background:  #f0edfb;
      color:       #111;
      min-height:  100vh;
    }

    /* Шапка */
    .demo-header {
      display:          flex;
      align-items:      center;
      justify-content:  space-between;
      padding:          0 32px;
      height:           60px;
      background:       #fff;
      border-bottom:    1px solid rgba(69,40,168,.12);
    }
    .demo-logo {
      font-weight: 700;
      font-size:   17px;
      color:       #4528A8;
      letter-spacing: -.3px;
    }

    /* Контент-страница */
    .demo-hero {
      max-width:  760px;
      margin:     80px auto 0;
      padding:    0 24px 80px;
      text-align: center;
    }
    .demo-hero h1 {
      font-size:      36px;
      font-weight:    800;
      line-height:    1.2;
      color:          #4528A8;
      margin-bottom:  16px;
    }
    .demo-hero p {
      font-size:    17px;
      line-height:  1.6;
      color:        rgba(17,17,17,.65);
      margin-bottom: 40px;
    }

    /* ── Панель тестирования ── */
    .dev-panel {
      position:      fixed;
      bottom:        24px;
      left:          50%;
      transform:     translateX(-50%);
      z-index:       10000;
      display:       flex;
      align-items:   center;
      gap:           12px;
      padding:       12px 20px;
      background:    #1a1a2e;
      border-radius: 14px;
      box-shadow:    0 8px 32px rgba(0,0,0,.35);
      white-space:   nowrap;
    }

    .dev-panel__label {
      font-size:   11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color:       rgba(255,255,255,.45);
      user-select: none;
    }

    .dev-panel__btn {
      display:       inline-flex;
      align-items:   center;
      gap:           6px;
      padding:       8px 16px;
      font-family:   inherit;
      font-size:     13px;
      font-weight:   600;
      border:        none;
      border-radius: 8px;
      cursor:        pointer;
      transition:    filter .15s;
    }
    .dev-panel__btn:hover { filter: brightness(1.1); }

    .dev-panel__btn--show {
      background: #653FE5;
      color:      #fff;
    }

    .dev-panel__btn--reset {
      background: rgba(255,255,255,.1);
      color:      rgba(255,255,255,.8);
    }

    /* Индикатор статуса */
    .dev-panel__status {
      font-size:  12px;
      color:      rgba(255,255,255,.5);
      font-style: italic;
      min-width:  120px;
      text-align: right;
    }
    .dev-panel__status.ok    { color: #4ade80; }
    .dev-panel__status.error { color: #f87171; }

    /* Лог запросов */
    .dev-log {
      position:      fixed;
      bottom:        80px;
      right:         20px;
      width:         360px;
      max-height:    240px;
      overflow-y:    auto;
      background:    #0f0f1a;
      border:        1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      padding:       12px 14px;
      font-family:   "IBM Plex Mono", monospace;
      font-size:     11px;
      color:         #a0aec0;
      display:       none; /* скрыт по умолчанию, открывается при первом запросе */
    }
    .dev-log__title {
      font-size:   10px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color:       rgba(255,255,255,.3);
      margin-bottom: 8px;
    }
    .dev-log__entry {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      line-height:   1.5;
    }
    .dev-log__entry:last-child { border-bottom: none; margin-bottom: 0; }
    .dev-log__method { color: #68d391; font-weight: 700; }
    .dev-log__url    { color: #76e4f7; }
    .dev-log__body   { color: #faf089; }
  </style>
</head>
<body>

  <!-- Имитация шапки EdTech-сайта -->
  <header class="demo-header">
    <span class="demo-logo">EduBrand</span>
    <span style="font-size:13px;color:rgba(17,17,17,.4);">Тестовая среда</span>
  </header>

  <!-- Имитация контента страницы -->
  <main class="demo-hero">
    <h1>Онлайн-курсы для вашего роста</h1>
    <p>
      Выберите направление и начните учиться уже сегодня.<br />
      Квиз автоматически появится через 25 сек (desktop) или 35 сек (mobile).<br />
      Используйте панель внизу для быстрого тестирования.
    </p>
  </main>

  <!-- Контейнер для монтирования виджета -->
  <div id="quiz-widget-root"></div>

  <!-- Панель разработчика -->
  <div class="dev-panel">
    <span class="dev-panel__label">Dev</span>
    <button class="dev-panel__btn dev-panel__btn--show" onclick="devShowNow()">
      ▶ Показать квиз
    </button>
    <button class="dev-panel__btn dev-panel__btn--reset" onclick="devReset()">
      ↺ Сбросить cooldown
    </button>
    <span class="dev-panel__status" id="dev-status">Ожидание таймера…</span>
  </div>

  <!-- Лог перехваченных запросов -->
  <div class="dev-log" id="dev-log">
    <div class="dev-log__title">Перехваченные запросы</div>
  </div>


  <!-- ═══════════════════════════════════════════════════════════════
       ЗАГЛУШКА /api/lead
       Перехватывает fetch до загрузки виджета. Возвращает { success: true }.
       Убрать этот блок при подключении реального бэкенда.
  ════════════════════════════════════════════════════════════════ -->
  <script>
    (function installMockApi() {
      const _fetch = window.fetch.bind(window);

      window.fetch = function mockFetch(url, options) {
        // Перехватываем только /api/lead
        if (typeof url === 'string' && url === '/api/lead') {
          const body = options?.body ? JSON.parse(options.body) : {};

          logRequest('POST', url, body);
          setStatus('ok', 'Лид отправлен (mock)');

          // Возвращаем успешный Response с небольшой задержкой (имитация сети)
          return new Promise(resolve =>
            setTimeout(() => {
              resolve(new Response(
                JSON.stringify({ success: true, mock: true }),
                { status: 200, headers: { 'Content-Type': 'application/json' } }
              ));
            }, 600)
          );
        }

        // Остальные запросы (quiz-config.json и т.д.) проходят без перехвата
        return _fetch(url, options);
      };

      function logRequest(method, url, body) {
        const log = document.getElementById('dev-log');
        log.style.display = 'block';

        const entry = document.createElement('div');
        entry.className = 'dev-log__entry';
        entry.innerHTML =
          `<span class="dev-log__method">${method}</span> ` +
          `<span class="dev-log__url">${url}</span><br/>` +
          `<span class="dev-log__body">${JSON.stringify(body, null, 2)}</span>`;

        // Вставляем новую запись наверх
        const title = log.querySelector('.dev-log__title');
        log.insertBefore(entry, title.nextSibling);
      }
    })();
  </script>


  <!-- ═══════════════════════════════════════════════════════════════
       Скрипты виджета (порядок важен)
  ════════════════════════════════════════════════════════════════ -->
  <script src="widget/quiz-api.js"></script>
  <script src="widget/quiz-logic.js"></script>
  <script src="widget/quiz-widget.js"></script>

  <!-- ═══════════════════════════════════════════════════════════════
       Инициализация и панель разработчика
  ════════════════════════════════════════════════════════════════ -->
  <script>
    // Инициализируем виджет — запускается таймер (25 сек desktop / 35 сек mobile)
    QuizWidget.init({
      containerId: 'quiz-widget-root',
      configUrl:   'widget/quiz-config.json',
    });

    /** Показывает квиз немедленно, минуя таймер */
    function devShowNow() {
      QuizWidget.show();
      setStatus('ok', 'Квиз открыт вручную');
    }

    /** Сбрасывает cooldown в localStorage и переинициализирует виджет */
    function devReset() {
      localStorage.removeItem('eb_quiz_last_shown');
      QuizWidget.destroy();
      QuizWidget.init({
        containerId: 'quiz-widget-root',
        configUrl:   'widget/quiz-config.json',
      });
      setStatus(null, 'Cooldown сброшен, таймер перезапущен');
    }

    function setStatus(type, text) {
      const el = document.getElementById('dev-status');
      el.textContent  = text;
      el.className    = 'dev-panel__status' + (type ? ' ' + type : '');
    }
  </script>

</body>
</html>
